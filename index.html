<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>便签小本本</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-appearance: none;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: #f5f5f5;
  padding-bottom: 30px;
}

/* 仿微信导航栏 */
.nav {
  background: #fff;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 500;
  border-bottom: 1px solid #e5e5e5;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* 输入区域 */
.input-box {
  background: #fff;
  margin: 15px;
  border-radius: 10px;
  padding: 12px 15px;
}
textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 16px;
  line-height: 1.5;
  resize: none;
  min-height: 80px;
}
.add-btn {
  text-align: right;
  margin-top: 8px;
}
.add-btn button {
  background: #07c160;
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
}

/* 便签列表 */
.list {
  margin: 0 15px;
}
.note-item {
  background: #fff;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.note-text {
  font-size: 16px;
  line-height: 1.5;
  color: #333;
}
.note-time {
  font-size: 12px;
  color: #999;
  margin-top: 6px;
}
.delete {
  position: absolute;
  right: 12px;
  top: 12px;
  color: #fa5151;
  font-size: 14px;
  background: none;
  border: none;
}
</style>
</head>

<body>

<div class="nav">便签小本本</div>

<div class="input-box">
  <textarea id="content" placeholder="写点什么..."></textarea>
  <div class="add-btn">
    <button onclick="saveNote()">保存便签</button>
  </div>
</div>

<div class="list" id="list"></div>

<script>
// 读取本地存储
function getNotes() {
  let data = localStorage.getItem('my_notes');
  return data ? JSON.parse(data) : [];
}

// 保存便签
function saveNote() {
  let content = document.getElementById('content').value.trim();
  if (!content) return alert('请输入内容');
  
  let notes = getNotes();
  notes.unshift({
    content: content,
    time: new Date().toLocaleString()
  });
  localStorage.setItem('my_notes', JSON.stringify(notes));
  document.getElementById('content').value = '';
  render();
}

// 渲染列表
function render() {
  let list = document.getElementById('list');
  let notes = getNotes();
  list.innerHTML = notes.map((item, i) => `
    <div class="note-item">
      <div class="note-text">${item.content}</div>
      <div class="note-time">${item.time}</div>
      <button class="delete" onclick="del(${i})">删除</button>
    </div>
  `).join('');
}

// 删除
function del(index) {
  if (!confirm('确定删除？')) return;
  let notes = getNotes();
  notes.splice(index, 1);
  localStorage.setItem('my_notes', JSON.stringify(notes));
  render();
}

// 初始化
render();
</script>
</body>
</html>
