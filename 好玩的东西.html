<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 微信端关键适配：禁止缩放、自动适应屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给你的悄悄话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        body {
            /* 微信端背景适配，柔和不刺眼 */
            background: linear-gradient(135deg, #ffeff6 0%, #ffe4ec 100%);
            color: #d81b60;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 40px;
            text-shadow: 1px 1px 3px rgba(255, 105, 180, 0.3);
        }

        .question {
            font-size: 20px;
            margin-bottom: 60px;
            color: #333;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 120px;
        }

        .btn-yes {
            background: #e91e63;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
        }

        .btn-no {
            background: #f0f0f0;
            color: #666;
            position: relative;
        }

        .btn-yes:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(233, 30, 99, 0.4);
        }

        /* 适配微信内置浏览器的弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: #e91e63;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">💌 我有句话想对你说</div>
    <div class="question">可以做我对象吗？<br>我会一直喜欢你的</div>

    <div class="btn-group">
        <button class="btn btn-yes" onclick="showLove()">愿意 ❤️</button>
        <button class="btn btn-no" id="noBtn">不愿意</button>
    </div>

    <!-- 微信端适配的弹窗，比原生alert更美观 -->
    <div class="modal" id="loveModal">
        <div class="modal-content">
            <h2>太好了！🥰</h2>
            <p>我超级超级开心！<br>以后的每一天，都请多多指教啦～</p>
            <button onclick="closeModal()">知道啦！</button>
        </div>
    </div>

    <script>
        // 适配微信端的按钮乱跑效果（触摸+点击都生效）
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('touchstart', moveNoBtn);
        noBtn.addEventListener('mouseover', moveNoBtn);

        function moveNoBtn() {
            // 限制移动范围，防止跑出屏幕
            const maxX = window.innerWidth - noBtn.offsetWidth - 40;
            const maxY = window.innerHeight - noBtn.offsetHeight - 100;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // 显示表白弹窗
        function showLove() {
            document.getElementById('loveModal').style.display = 'flex';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('loveModal').style.display = 'none';
        }
    </script>
</body>
</html>
